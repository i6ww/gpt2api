server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $admin_upstream admin:17188;

    # 管理后台 API（cmd/admin，容器内 17188）
    location ^~ /admin/api/ {
        proxy_pass http://$admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Vite 打包出来的 hash 化资源 — 文件名带 content hash，可以永久 immutable
    location ~* ^/assets/.*\.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # public/ 下固定文件名资源（favicon、logo 等）— 短缓存，避免发新版后浏览器死命用旧文件
    location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
