# =====================================================
# KleinAI · 本地多端口集群联调（一份文件 × N 节点）
#
# 用法：
#   docker compose -f deploy/docker-compose.cluster-local.yml \
#     --env-file deploy/env/.env.agent-1.local \
#     -p klein-agent-1 up -d
#
# 每个 agent 用独立的 .env.agent-N.local + 独立 project name (-p)。
# 文档：deploy/docs/LOCAL_CLUSTER.md
# =====================================================

x-common-env: &agent-env
  KLEIN_NODE_ID: ${KLEIN_NODE_ID}
  KLEIN_NODE_TOKEN: ${KLEIN_NODE_TOKEN}
  KLEIN_CONTROL_URL: ${KLEIN_CONTROL_URL}
  KLEIN_NODE_PUBLIC_URL: ${KLEIN_NODE_PUBLIC_URL}
  KLEIN_AGENT_PORT: ${KLEIN_AGENT_PORT:-27180}
  KLEIN_AGENT_BIND: 0.0.0.0:${KLEIN_AGENT_PORT:-27180}
  KLEIN_AGENT_MAX_CONCURRENCY: ${KLEIN_AGENT_MAX_CONCURRENCY:-4}
  KLEIN_STORAGE_ROOT: /var/klein/storage/public
  KLEIN_STATE_DIR: /var/klein/state
  KLEIN_AGENT_STORAGE_QUOTA_GB: ${KLEIN_AGENT_STORAGE_QUOTA_GB:-20}
  KLEIN_AGENT_PROVIDERS: ${KLEIN_AGENT_PROVIDERS:-gpt,grok,adobe}
  KLEIN_HEARTBEAT_SEC: ${KLEIN_AGENT_HEARTBEAT_SEC:-5}
  KLEIN_LEASE_INTERVAL_SEC: ${KLEIN_AGENT_LEASE_SEC:-2}
  KLEIN_LOG_DIR: /app/logs
  TZ: Asia/Shanghai

services:
  agent:
    image: kleinai/backend:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-klein-agent}-agent
    restart: unless-stopped
    command: ["/app/agent"]
    environment:
      <<: *agent-env
    expose:
      - "${KLEIN_AGENT_PORT:-27180}"
    ports:
      # 直连 agent HTTP（仅本地调试用，生产里只暴露给 nginx）
      - "${KLEIN_AGENT_HOST_PORT:-27180}:${KLEIN_AGENT_PORT:-27180}"
    volumes:
      - klein-agent-storage:/var/klein/storage
      - klein-agent-state:/var/klein/state
      - klein-agent-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits: { cpus: '2', memory: 1G }
    networks: [edge]

  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-klein-agent}-nginx
    restart: unless-stopped
    depends_on: [agent]
    ports:
      - "${KLEIN_EDGE_HOST_PORT:-27080}:${KLEIN_EDGE_HTTP_PORT:-27080}"
    environment:
      KLEIN_EDGE_HTTP_PORT: ${KLEIN_EDGE_HTTP_PORT:-27080}
      KLEIN_NODE_HOST: ${KLEIN_NODE_HOST:-_}
      KLEIN_AGENT_PORT: ${KLEIN_AGENT_PORT:-27180}
      KLEIN_CONTROL_PUBLIC_ORIGIN: ${KLEIN_CONTROL_PUBLIC_ORIGIN:-http://klein.local:17080}
    volumes:
      - ./nginx-edge/edge.conf.template:/etc/nginx/templates/default.conf.template:ro
      - klein-agent-storage:/var/klein/storage:ro
      - klein-agent-logs:/var/log/nginx
    networks: [edge]

volumes:
  klein-agent-storage:
  klein-agent-state:
  klein-agent-logs:

networks:
  edge:
    driver: bridge
