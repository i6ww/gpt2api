server {
    listen 80;
    server_name _;

    client_max_body_size 64m;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $openai_upstream http://openai:17200;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # API compatibility fallback. In production Caddy normally routes /v1 and
    # /v1beta directly to the openai service, but IP/default-host traffic may
    # still land in user-web. Keep these routes here so SDK clients never hit
    # the SPA fallback (which returns nginx 405 for POST).
    location ^~ /v1/ {
        proxy_pass $openai_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /v1beta/ {
        proxy_pass $openai_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Vite 打包出来的 hash 化资源
    location ~* ^/assets/.*\.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # public/ 下固定文件名资源 — 短缓存
    location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
