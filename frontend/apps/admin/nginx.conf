server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Vite 打包出来的 hash 化资源 — 内容哈希在文件名里，永久 immutable 安全
    location ~* ^/assets/.*\.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # public/ 下的固定文件名资源（favicon、logo 等）— 短缓存 + revalidate
    location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
